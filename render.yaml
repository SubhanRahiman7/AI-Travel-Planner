services:
 - type: web
 name: ai-travel-planner-api
 runtime: python
 rootDir: backend
 plan: free
 region: oregon
 buildCommand: "pip install -r requirements.txt"
 startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
 healthCheckPath: /api/v1/health
 envVars:
 - key: GEMINI_API_KEY
 sync: false
 - key: GROQ_API_KEY
 sync: false
 - key: PYTHON_VERSION
 value: "3.11.0"
